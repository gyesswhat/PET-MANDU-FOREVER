<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>mandu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <div id="titlebar-title">mandu 🐾</div>
    </div>

    <main id="stage">
      <p id="hint">아..누가안쓰다듬어주나..</p>

      <div id="bubble-wrap">
        <div id="speech-bubble">
          <span id="bubble-text"></span>
        </div>
      </div>

      <div id="mandu-wrap">
        <!--
          만두 사진은 사용자가 직접 넣어주세요.
          파일 경로:
            images/mandu_lay.png      ← 누워있는 만두 (기본 상태)
            images/mandu_up.png       ← 고개 든 만두 (쓰다듬은 후, 꼬리 기본 위치)
            images/mandu_up_wag.png   ← 고개 든 만두 (꼬리 흔드는 중간 단계)
            images/mandu_eat.png      ← 간식 받아먹는 만두 (혀 빼물고 냠냠)
        -->
        <img
          id="mandu-img"
          src="./images/mandu_lay.png"
          alt="만두"
          draggable="false"
        />
        <div id="hearts"></div>
      </div>
    </main>

    <button id="treat-btn" type="button" title="간식 주기" aria-label="간식 주기">
      <span class="treat-icon">🦴</span>
      <span class="treat-label">간식</span>
    </button>

    <button id="minigame-btn" type="button" title="미니게임" aria-label="미니게임">
      <span class="treat-icon">🎮</span>
      <span class="treat-label">게임</span>
    </button>

    <button id="walk-btn" type="button" title="산책" aria-label="산책">
      <span class="treat-icon">🐾</span>
      <span class="treat-label">산책</span>
    </button>

    <div id="game-root" hidden></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
